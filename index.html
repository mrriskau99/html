<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NKT Member Widget</title>
</head>

<body style="margin:0;background:transparent;">

<div id="app" style="
width:250px;
margin:0 auto;
padding:14px;
background:rgba(235,242,255,0.78);
border-radius:20px;
border:1px solid rgba(110,168,255,0.45);
box-shadow:0 12px 30px rgba(0,0,0,0.25),0 0 25px rgba(110,168,255,0.25);
backdrop-filter:blur(12px);
font-family:Segoe UI;
color:#0b1a2b;
text-align:center;
">

<div style="
font-size:14px;
letter-spacing:2px;
margin-bottom:12px;
color:#2a4d8f;
text-shadow:0 0 10px rgba(110,168,255,0.5);
">
NEW MEMBERS
</div>

<div id="members"></div>

</div>

<script>

const club = "nashediyon-ki-toli"; // CHANGE if needed

async function loadMembers(){

let res = await fetch(`https://api.chess.com/pub/club/nashediyon-ki-toli/members`);
let data = await res.json();

// take first 3 users
let users = data.all_time.slice(0,3);

let container = document.getElementById("members");

container.innerHTML = "";

for(let i=0;i<users.length;i++){

let username = users[i].username;

// fetch profile
let profileRes = await fetch(`https://api.chess.com/pub/player/${username}`);
let profile = await profileRes.json();

// fetch status
let statusRes = await fetch(`https://api.chess.com/pub/player/${username}/is-online`);
let statusData = await statusRes.json();

let online = statusData.online;

if(i==0){
// BIG CARD
container.innerHTML += `
<div style="
margin-bottom:12px;
padding:12px;
border-radius:18px;
background:linear-gradient(145deg,#0c1324,#05070d);
color:#dbe6ff;
border:1px solid rgba(110,168,255,0.3);
box-shadow:0 0 10px rgba(110,168,255,0.3);
">

<img src="${profile.avatar || 'https://www.chess.com/bundles/web/images/noavatar_l.84a92436.gif'}"
style="width:70px;height:70px;border-radius:50%;margin-bottom:8px;">

<div style="font-size:13px;">${username}</div>

<div style="
font-size:10px;
color:${online ? '#00ff9f' : '#888'};
">
${online ? '● ONLINE' : '● OFFLINE'}
</div>

</div>
`;
}else{
// SMALL CARDS
container.innerHTML += `
<div style="
display:flex;
align-items:center;
padding:8px 10px;
margin-bottom:8px;
border-radius:999px;
background:linear-gradient(145deg,#0c1324,#05070d);
color:#dbe6ff;
border:1px solid rgba(110,168,255,0.3);
">

<img src="${profile.avatar || 'https://www.chess.com/bundles/web/images/noavatar_l.84a92436.gif'}"
style="width:32px;height:32px;border-radius:50%;margin-right:10px;">

<div style="flex:1;text-align:left;font-size:12px;">${username}</div>

<div style="font-size:10px;color:${online ? '#00ff9f' : '#888'};">
●
</div>

</div>
`;
}

}

}

loadMembers();

</script>

</body>
</html>
