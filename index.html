<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday ❤️</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
      overflow:hidden;
      color:white;
      min-height:100vh;
    }

    .screen{
      min-height:100vh;
      display:none;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      position:relative;
      padding:20px;
      overflow:hidden;
    }

    .active{
      display:flex;
    }

    .title{
      font-size:clamp(3rem,8vw,6rem);
      font-weight:800;
      text-align:center;
      margin-bottom:20px;
      animation:glow 2s infinite alternate;
    }

    @keyframes glow{
      from{
        text-shadow:0 0 10px #ff4da6;
      }
      to{
        text-shadow:0 0 30px #ff4da6;
      }
    }

    .subtitle{
      font-size:1.2rem;
      color:#ffd6ec;
      margin-bottom:40px;
      text-align:center;
    }

    .cake{
      font-size:10rem;
      cursor:pointer;
      animation:bounce 2s infinite;
      transition:0.4s;
    }

    .cake:hover{
      transform:scale(1.1);
    }

    @keyframes bounce{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-20px);
      }
    }

    .photo-card{
      width:340px;
      height:480px;
      border-radius:35px;
      overflow:hidden;
      position:relative;
      cursor:pointer;
      transition:0.5s;
      box-shadow:0 20px 60px rgba(0,0,0,0.5);
    }

    .photo-card:hover{
      transform:scale(1.03);
    }

    .photo-card img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .photo-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
      display:flex;
      align-items:end;
      justify-content:center;
      padding-bottom:30px;
      font-size:1.3rem;
      font-weight:600;
      text-align:center;
    }

    .main-content{
      width:100%;
      max-width:800px;
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:35px;
      padding:40px;
      box-shadow:0 20px 60px rgba(0,0,0,0.4);
      position:relative;
      z-index:2;
      animation:fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .main-heading{
      font-size:clamp(2.5rem,6vw,5rem);
      font-weight:800;
      line-height:1.1;
      margin-bottom:25px;
    }

    .preview-text{
      min-height:140px;
      line-height:1.9;
      color:#ffe5f2;
      border-left:3px solid #ff8cc6;
      padding-left:20px;
      margin-bottom:40px;
      white-space:pre-line;
    }

    .envelope-wrapper{
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .envelope{
      width:180px;
      height:130px;
      background:#ffb3d9;
      border-radius:0 0 20px 20px;
      position:relative;
      cursor:pointer;
      transition:0.4s;
      overflow:hidden;
      box-shadow:0 15px 40px rgba(0,0,0,0.4);
    }

    .envelope:hover{
      transform:scale(1.06);
    }

    .envelope::before{
      content:'';
      position:absolute;
      inset:0;
      background:#ff8cc6;
      clip-path:polygon(0 0,50% 55%,100% 0,100% 100%,0 100%);
    }

    .envelope-icon{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:3rem;
      z-index:2;
    }

    .open-text{
      margin-top:20px;
      color:#ffe5f2;
      animation:pulse 2s infinite;
    }

    @keyframes pulse{
      0%,100%{
        opacity:1;
      }
      50%{
        opacity:0.5;
      }
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.75);
      backdrop-filter:blur(10px);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:999;
    }

    .modal.active{
      display:flex;
    }

    .letter{
      background:white;
      color:#222;
      width:100%;
      max-width:800px;
      border-radius:30px;
      padding:50px;
      position:relative;
      animation:pop 0.5s ease;
      max-height:90vh;
      overflow-y:auto;
    }

    @keyframes pop{
      from{
        transform:scale(0.8);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }

    .close{
      position:absolute;
      top:20px;
      right:25px;
      font-size:2rem;
      cursor:pointer;
    }

    .letter-title{
      text-align:center;
      font-size:3rem;
      color:#ff4da6;
      margin-bottom:30px;
      font-family:'Dancing Script',cursive;
    }

    .letter-text{
      line-height:2;
      font-size:1.1rem;
      white-space:pre-line;
    }

    .heart{
      position:absolute;
      color:rgba(255,255,255,0.2);
      animation:float 10s linear infinite;
      pointer-events:none;
    }

    @keyframes float{
      0%{
        transform:translateY(100vh) rotate(0deg);
        opacity:0;
      }
      10%{
        opacity:1;
      }
      100%{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
      }
    }

    @media(max-width:768px){
      .main-content{
        padding:25px;
      }

      .letter{
        padding:30px;
      }
    }

  </style>
</head>

<body>

<div id="cakeScreen" class="screen active">
  <h1 class="title">Make A Wish ✨</h1>
  <p class="subtitle">Tap the birthday cake to cut it 🎂</p>

  <div class="cake" onclick="showPhoto()">🎂</div>
</div>

<div id="photoScreen" class="screen">
  <div class="photo-card" onclick="showMain()">

    <img src="https://raw.githubusercontent.comWhatsApp%20Image%202026-05-22%20at%2010.52.39%20PM%20(1).jpeg">

    <div class="photo-overlay">
      Tap To Open Your Surprise ❤️
    </div>

  </div>
</div>

<div id="mainScreen" class="screen">

  <div class="main-content">

    <div class="main-heading">
      Happy Birthday <br>
      My Love ❤️
    </div>

    <div class="preview-text" id="previewText"></div>

    <div class="envelope-wrapper">

      <div class="envelope" onclick="openLetter()">
        <div class="envelope-icon">💌</div>
      </div>

      <div class="open-text">
        Open Your Letter ❤️
      </div>

    </div>

  </div>

</div>

<div id="letterModal" class="modal">

  <div class="letter">

    <div class="close" onclick="closeLetter()">✕</div>

    <div class="letter-title">
      For You ❤️
    </div>

    <div class="letter-text" id="letterText"></div>

  </div>

</div>

<script>

const previewMessage =
"Every moment with you feels softer, warmer, and more beautiful ❤️";

const letterMessage =
`Happy Birthday My Love ❤️

I honestly do not know how to explain how much you mean to me.

Thank you for every smile, every late night conversation, every little moment, and every memory we created together.

You make life feel lighter and happier just by existing.

I hope this year gives you everything your heart secretly wishes for.

And no matter what happens, always remember this:

You are deeply loved.
Forever. ✨`;

function createHearts(){
  for(let i=0;i<25;i++){

    const heart=document.createElement('div');

    heart.className='heart';
    heart.innerHTML='❤';

    heart.style.left=Math.random()*100+'vw';
    heart.style.fontSize=(20+Math.random()*30)+'px';
    heart.style.animationDuration=(8+Math.random()*8)+'s';
    heart.style.animationDelay=Math.random()*5+'s';

    document.body.appendChild(heart);
  }
}

createHearts();

function showPhoto(){
  document.getElementById('cakeScreen').classList.remove('active');
  document.getElementById('photoScreen').classList.add('active');
}

function showMain(){
  document.getElementById('photoScreen').classList.remove('active');
  document.getElementById('mainScreen').classList.add('active');

  typePreview();
}

let previewIndex=0;

function typePreview(){

  const el=document.getElementById('previewText');

  const interval=setInterval(()=>{

    el.innerHTML += previewMessage.charAt(previewIndex);

    previewIndex++;

    if(previewIndex>=previewMessage.length){
      clearInterval(interval);
    }

  },10);

}

function openLetter(){

  document.getElementById('letterModal').classList.add('active');

  const letter=document.getElementById('letterText');

  letter.innerHTML='';

  let i=0;

  const typing=setInterval(()=>{

    letter.innerHTML += letterMessage.charAt(i);

    i++;

    if(i>=letterMessage.length){
      clearInterval(typing);
    }

  },10);

}

function closeLetter(){
  document.getElementById('letterModal').classList.remove('active');
}

</script>

</body>
</html>
